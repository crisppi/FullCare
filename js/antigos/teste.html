<!Doctype html>
<html>

<head>
    <link rel="icon" type="image/png" href="/FullCare/assets/fullcare-icon.png?v=fullcare2">
    <link rel="shortcut icon" type="image/png" href="/FullCare/assets/fullcare-icon.png?v=fullcare2">
    <link rel="apple-touch-icon" href="/FullCare/assets/fullcare-icon.png?v=fullcare2">

	<title>JQuery AJAX Call</title>
	
	<!--Include JQuery Library -->
	<script src=
"https://code.jquery.com/jquery-3.5.0.js">
	</script>
	
</head>

<body>
	<form id='formId' action=''> Name:
		<input type='text'
			id='nm'
			name='nm'>
		</input>
		<br> Student ID:
		<input type='text'
			id='studentId'
			name='studentId'>
		</input>
		<br> Contact No. :
		<input type='text'
			id='contactNumber'
			name='contactNumber'>
		</input>
		<br>
		<button type='submit'
			id='submitButton'>
			Submit
		</button>
	</form>
</body>
<script>
	
	// When DOM is loaded this
	// function will get executed
	$(() => {
		// function will get executed
		// on click of submit button
		$("#submitButton").click(function(ev) {
			var form = $("#formId");
			$.ajax({
				type: "POST",
				url: 'tratar.php',
				data: form.serialize(),
				success: function(data) {
					
					// Ajax call completed successfully
					alert("Form Submited Successfully");
				},
				error: function(data) {
					
					// Some error in ajax call
					alert("some Error");
				}
			});
		});
	});
	</script>
</html>
