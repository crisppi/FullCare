      <text x="239" y="151" font-size="7" font-weight="700" fill="#5b6778">Hospitais</text>
      <text x="334" y="151" font-size="7" font-weight="700" fill="#5b6778">Periodo</text>
      <text x="556" y="150" font-size="8" font-weight="700" fill="#fff">Aplicar</text>
