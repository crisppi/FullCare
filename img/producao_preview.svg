<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" role="img" aria-labelledby="title desc">
  <title id="title">Preview do dashboard Producao FullCare</title>
  <desc id="desc">Tela de dashboard de producao com graficos e indicadores.</desc>
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset="1" stop-color="#edf4fb"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#421849"/>
      <stop offset="1" stop-color="#67327a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".78"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="17" flood-color="#170b28" flood-opacity=".27"/>
    </filter>
    <filter id="chipShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#170b28" flood-opacity=".18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="99" y="58" width="562" height="274" rx="28" fill="#121826"/>
    <rect x="112" y="71" width="536" height="248" rx="18" fill="url(#screenBg)"/>
    <rect x="112" y="71" width="536" height="39" rx="18" fill="url(#topbar)"/>
    <path d="M112 94h536v18H112z" fill="#5e2a71"/>

