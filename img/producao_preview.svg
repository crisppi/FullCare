    <circle cx="153" cy="90" r="5" fill="#ffc66c"/>
    <circle cx="170" cy="90" r="5" fill="#6fdfc2"/>
    <text x="196" y="94" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">Dashboard Producao</text>
    <text x="520" y="94" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#eadff1">FULLCARE BI</text>

    <g font-family="Inter, Arial, sans-serif">
      <rect x="132" y="128" width="496" height="38" rx="12" fill="#fff" stroke="#dce5ee"/>
      <rect x="146" y="139" width="67" height="16" rx="5" fill="#f1f5f9"/>
      <rect x="224" y="139" width="82" height="16" rx="5" fill="#f1f5f9"/>
      <rect x="317" y="139" width="78" height="16" rx="5" fill="#f1f5f9"/>
      <rect x="406" y="139" width="84" height="16" rx="5" fill="#f1f5f9"/>
      <rect x="536" y="136" width="72" height="22" rx="7" fill="#421849"/>
